include:
  countries: [AU]
  channel_ids:
    - BBCNews.uk
    - CNNInternational.us
    - AlJazeera.qa
    - SkyNews.uk
    - DW.de
    - France24.fr

exclude:
  categories: [shop, religious, auto, xxx]
  channel_ids: []
  name_patterns:
    - "(?i)test"
    - "(?i)24/?7\\s*(music|loop)"
    - "Ⓖ"   # Free-TV marker for geo-blocked streams (won't play out-of-region)

group_map:
  news:          News
  sports:        Sport
  kids:          Kids
  movies:        Movies
  music:         Music
  documentary:   Docos
  entertainment: Entertainment
  general:       Entertainment

# Real iptv-org IDs for AU channels that have active streams.
# SBS lineup, 7Two/7Mate, 9Rush, 10 HD/Peach, Nickelodeon AU are NOT in iptv-org —
# omitted until upstream adds them.
au_fta_ids:
  - ABCTV.au           # was ABC1.au
  - ABCTVPlus.au       # was ABC2.au
  - ABCNews.au
  - ABCEntertains.au   # ABC Comedy/Entertains, LCN 23
  - ABCKids.au         # shares LCN 22 daytime with ABC TV Plus
  - Channel7.au        # was SevenHD.au
  - Channel9.au        # was 9HD.au
  - 9Gem.au
  - 9Go.au
  - 9Life.au
  - 10Bold.au          # was TenBold.au

au_fta_lcn:
  ABCTV.au: 2
  ABCTVPlus.au: 22
  ABCNews.au: 24
  ABCEntertains.au: 23
  ABCKids.au: 22
  Channel7.au: 7
  Channel9.au: 9
  9Gem.au: 92
  9Go.au: 93
  9Life.au: 94
  10Bold.au: 12

custom_user_agent_channels: []

healthcheck:
  concurrency: 50
  timeout_seconds: 5
  max_redirects: 3
  user_agent: "VLC/3.0.20 LibVLC/3.0.20"
  quarantine_threshold: 3

group_order:
  - "AU FTA"
  - Australia
  - UK
  - USA
  - Canada
  - Ireland
  - Trinidad
  - News
  - Sport
  - Movies
  - Docos
  - Entertainment
  - Kids
  - Music
  - Other

epg_sources:
  AU: https://epgshare01.online/epgshare01/epg_ripper_AU1.xml.gz
  UK: https://epgshare01.online/epgshare01/epg_ripper_UK1.xml.gz
  US: https://epgshare01.online/epgshare01/epg_ripper_US1.xml.gz
  CA: https://epgshare01.online/epgshare01/epg_ripper_CA1.xml.gz
  IE: https://epgshare01.online/epgshare01/epg_ripper_IE1.xml.gz
  QA: https://epgshare01.online/epgshare01/epg_ripper_QA1.xml.gz
  DE: https://epgshare01.online/epgshare01/epg_ripper_DE1.xml.gz
  FR: https://epgshare01.online/epgshare01/epg_ripper_FR1.xml.gz
  # FAST-provider EPG (plain .xml). tvg-ids pair with the matching m3u in
  # playlist_sources, so guide data auto-populates for those channels.
  PLEX_AU: https://i.mjh.nz/Plex/au.xml
  PLEX_US: https://i.mjh.nz/Plex/us.xml
  PLEX_GB: https://i.mjh.nz/Plex/gb.xml
  PLEX_CA: https://i.mjh.nz/Plex/ca.xml
  SAMSUNG_US: https://i.mjh.nz/SamsungTVPlus/us.xml
  SAMSUNG_GB: https://i.mjh.nz/SamsungTVPlus/gb.xml
  SAMSUNG_CA: https://i.mjh.nz/SamsungTVPlus/ca.xml

# Maps an upstream EPG channel id (left) to the playlist tvg-id (right, an
# iptv-org id). A channel only shows guide data when its tvg-id matches a
# <channel>/<programme> id in the merged xmltv; epgshare01 uses its own id
# scheme, so unmapped channels list in the playlist but stay blank in the
# guide. Fill this in using report.json -> epg.missing_ids after a build.
epg_id_map: {}
  # Example (verify against the real epg_ripper_AU1.xml.gz channel ids):
  # 7HD.au: Channel7.au
  # 9HD.au: Channel9.au

iptv_org:
  streams:    https://iptv-org.github.io/api/streams.json
  channels:   https://iptv-org.github.io/api/channels.json
  categories: https://iptv-org.github.io/api/categories.json
  feeds:      https://iptv-org.github.io/api/feeds.json

output:
  epg_url: https://anguswilliams93.github.io/1ptv/epg.xml.gz

# External M3U playlists merged in alongside the iptv-org channels.
# Two forms:
#   - "<url>"                      → keep channels whose group-title is in
#                                    playlist_include_groups (e.g. Free-TV, which
#                                    groups by country). tvg-ids align with
#                                    epgshare01 so EPG auto-populates.
#   - {url: "<url>", group: "X"}   → force every channel into group "X". Used for
#                                    FAST providers (Pluto/Samsung/Plex) whose
#                                    files are region-per-URL with genre groups.
#
# NOTE on FAST sources: these are free ad-supported services, but the mjh.nz
# republished playlists have a DMCA history (Warner takedown, Aug 2024) and the
# URLs can change/break. The healthcheck drops any that stop resolving. Remove
# entries you don't want. Region codes verified: Samsung = us/ca/gb (no au),
# Plex = us/ca/gb/au.
playlist_sources:
  - https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u8
  - {url: "https://i.mjh.nz/Plex/au.m3u8", group: Australia}
  - {url: "https://i.mjh.nz/Plex/us.m3u8", group: USA}
  - {url: "https://i.mjh.nz/Plex/gb.m3u8", group: UK}
  - {url: "https://i.mjh.nz/Plex/ca.m3u8", group: Canada}
  - {url: "https://i.mjh.nz/SamsungTVPlus/us.m3u8", group: USA}
  - {url: "https://i.mjh.nz/SamsungTVPlus/gb.m3u8", group: UK}
  - {url: "https://i.mjh.nz/SamsungTVPlus/ca.m3u8", group: Canada}

# group-title values to keep from string-form playlist_sources (English markets).
# Sources with an explicit {group: ...} bypass this list.
playlist_include_groups:
  - Australia
  - UK
  - USA
  - Canada
  - Ireland
  - Trinidad
