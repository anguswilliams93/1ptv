name: build
on:
  schedule:
    - cron: '0 7 * * *'   # daily at 07:00 UTC = 5pm Sydney (AEST, UTC+10)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pipeline/**'
      - 'config.yaml'
      - 'requirements.txt'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      # Persist the healthcheck state across runs so the quarantine grace works:
      # channels proven alive tolerate transient failures, while never-alive ones
      # (dead/403) are dropped. Without this the counter resets every run.
      - name: Restore healthcheck state
        uses: actions/cache@v4
        with:
          path: build/_state.json
          key: healthcheck-state-${{ github.run_id }}
          restore-keys: |
            healthcheck-state-
      - run: python -m pipeline
      - name: Append report to job summary
        continue-on-error: true
        run: python scripts/job_summary.py build/report.json >> "$GITHUB_STEP_SUMMARY"
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/out
          publish_branch: gh-pages
          keep_files: false
          commit_message: "build ${{ github.run_number }}"
